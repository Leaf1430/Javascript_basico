<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula 1 - Pensamento Computacional</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
  #topbar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
  #topbar-left { font-weight: 600; font-size: 0.95rem; }
  #timer { display: flex; align-items: center; gap: 8px; font-family: 'Courier New', monospace; font-size: 1rem; }
  #timer-display { min-width: 60px; text-align: center; }
  #timer-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #0891b2; padding: 4px; }
  #controls { position: fixed; top: 48px; left: 0; right: 0; height: 52px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 24px; gap: 12px; z-index: 99; }
  #controls button { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: 0.2s; }
  #btn-executar { background: #0891b2; color: #fff; }
  #btn-reset { background: #e2e8f0; color: #1e293b; }
  #btn-rapido { background: #e2e8f0; color: #1e293b; transition: 0.2s; }
  #btn-rapido.ativo { background: #fcd34d; color: #1e293b; }
  #btn-pratica { background: #22c55e; color: #fff; display: none; }
  #btn-pratica a { color: inherit; text-decoration: none; }
  #main { margin-top: 100px; display: flex; height: calc(100vh - 100px); }
  #left-panel { width: 50%; background: #1e293b; color: #fff; padding: 16px; overflow-y: auto; border-right: 2px solid #475569; }
  #right-panel { width: 50%; background: #ecfeff; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; }
  .panel-header { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; color: #94a3b8; display: flex; align-items: center; justify-content: space-between; }
  #right-panel .panel-header { color: #0891b2; }
  #typing-indicator { font-size: 0.8rem; color: #94a3b8; animation: blink 1s step-end infinite; }
  #typing-indicator.hidden { visibility: hidden; }
  @keyframes blink { 50% { opacity: 0; } }
  #code-area { font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; }
  #code-area .line { opacity: 0.5; transition: opacity 0.3s; }
  #code-area .line.complete { opacity: 1; }
  .k { color: #c792ea; }
  .v { color: #f78c6c; }
  .s { color: #c3e88d; }
  .fn { color: #82aaff; }
  .c { color: #5a5a7a; font-style: italic; }
  #console-output { font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.6; color: #1e293b; }
  #console-output .line { margin: 2px 0; }
  #console-output .line::before { content: "> "; color: #0891b2; }
  footer.footer { text-align: center; padding: 16px; background: #f8fafc; border-top: 1px solid #e2e8f0; font-size: 0.85rem; color: #64748b; clear: both; }
</style>
</head>
<body>
<div id="topbar">
  <div id="topbar-left">💻 Aula 1 · Demonstração</div>
  <div id="timer">
    <button id="timer-btn">▶</button>
    <span id="timer-display">00:00</span>
  </div>
</div>
<div id="controls">
  <button id="btn-executar">▶ Executar Demonstração</button>
  <button id="btn-reset">⏹ Reset</button>
  <button id="btn-rapido">⚡ Rápido</button>
  <button id="btn-pratica"><a href="03_pratica.html">➜ Seguir para a Prática</a></button>
</div>
<div id="main">
  <div id="left-panel">
    <div class="panel-header"><span>Editor</span><span id="typing-indicator">Digitando...</span></div>
    <div id="code-area"></div>
  </div>
  <div id="right-panel">
    <div class="panel-header">Console ></div>
    <div id="console-output"></div>
  </div>
</div>
<footer class="footer">💻 Aula 1 · Projeto @karizeviecelli</footer>
<script>
  // lines of code to type
  const codeLines = [
    { text: 'let nome = "Sora";', isConsole: false },
    { text: 'let idade = 16;', isConsole: false },
    { text: 'let cidade = "Blumenau";', isConsole: false },
    { text: 'let estudando = "JavaScript";', isConsole: false },
    { text: 'console.log("Olá, " + nome + "!");', isConsole: true, outputText: 'Olá, Sora!' },
    { text: 'console.log("Você tem " + idade + " anos.");', isConsole: true, outputText: 'Você tem 16 anos.' },
    { text: 'console.log("Mora em " + cidade + ".");', isConsole: true, outputText: 'Mora em Blumenau.' },
    { text: 'console.log(`Estuda ${estudando} — legal!`);', isConsole: true, outputText: 'Estuda JavaScript — legal!' }
  ];

  const codeArea = document.getElementById('code-area');
  const consoleOutput = document.getElementById('console-output');
  const typingIndicator = document.getElementById('typing-indicator');
  const timerDisplay = document.getElementById('timer-display');
  const timerBtn = document.getElementById('timer-btn');
  const btnExecutar = document.getElementById('btn-executar');
  const btnReset = document.getElementById('btn-reset');
  const btnRapido = document.getElementById('btn-rapido');
  const btnPratica = document.getElementById('btn-pratica');

  let timerInterval = null;
  let seconds = 0;
  let isRunning = false;
  let isAnimating = false;
  let animationTimeout = null;
  let currentLineIndex = 0;
  let currentCharIndex = 0;
  let lineElements = [];
  let isFast = false;

  function formatTime(sec) {
    const m = String(Math.floor(sec / 60)).padStart(2, '0');
    const s = String(sec % 60).padStart(2, '0');
    return m + ':' + s;
  }

  function startTimer() {
    if (isRunning) return;
    isRunning = true;
    timerBtn.textContent = '⏸';
    timerInterval = setInterval(() => {
      seconds++;
      timerDisplay.textContent = formatTime(seconds);
    }, 1000);
  }

  function pauseTimer() {
    if (!isRunning) return;
    isRunning = false;
    timerBtn.textContent = '▶';
    clearInterval(timerInterval);
  }

  function resetTimer() {
    pauseTimer();
    seconds = 0;
    timerDisplay.textContent = '00:00';
  }

  timerBtn.addEventListener('click', () => {
    if (isRunning) pauseTimer();
    else startTimer();
  });

  btnRapido.addEventListener('click', () => {
    isFast = !isFast;
    btnRapido.classList.toggle('ativo', isFast);
  });

  function resetAll() {
    pauseTimer();
    resetTimer();
    clearTimeout(animationTimeout);
    isAnimating = false;
    currentLineIndex = 0;
    currentCharIndex = 0;
    codeArea.innerHTML = '';
    consoleOutput.innerHTML = '';
    lineElements = [];
    typingIndicator.classList.add('hidden');
    btnPratica.style.display = 'none';
    btnExecutar.disabled = false;
  }

  btnReset.addEventListener('click', resetAll);

  function startAnimation() {
    if (isAnimating) return;
    resetAll();
    isAnimating = true;
    btnExecutar.disabled = true;
    startTimer();
    typingIndicator.classList.remove('hidden');
    // create line placeholders
    codeLines.forEach((line, idx) => {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      lineDiv.id = 'line-' + idx;
      codeArea.appendChild(lineDiv);
      lineElements.push(lineDiv);
    });
    currentLineIndex = 0;
    typeNextLine();
  }

  btnExecutar.addEventListener('click', startAnimation);

  function typeNextLine() {
    if (currentLineIndex >= codeLines.length) {
      // animation done
      isAnimating = false;
      typingIndicator.classList.add('hidden');
      btnPratica.style.display = 'inline-block';
      btnExecutar.disabled = false;
      return;
    }
    const line = codeLines[currentLineIndex];
    const lineDiv = lineElements[currentLineIndex];
    currentCharIndex = 0;
    lineDiv.textContent = '';
    typeChar(line, lineDiv);
  }

  function typeChar(line, lineDiv) {
    if (currentCharIndex < line.text.length) {
      lineDiv.textContent += line.text[currentCharIndex];
      currentCharIndex++;
      const delay = isFast ? 10 : 50;
      animationTimeout = setTimeout(() => typeChar(line, lineDiv), delay);
    } else {
      // line complete, apply syntax highlighting
      lineDiv.innerHTML = highlightLine(line.text);
      lineDiv.classList.add('complete');
      // if console line, output after a short delay
      if (line.isConsole) {
        setTimeout(() => {
          const outputLine = document.createElement('div');
          outputLine.className = 'line';
          outputLine.textContent = line.outputText;
          consoleOutput.appendChild(outputLine);
        }, 300);
      }
      // proceed to next line after pause
      currentLineIndex++;
      const pause = isFast ? 100 : 500;
      animationTimeout = setTimeout(typeNextLine, pause);
    }
  }

  function highlightLine(text) {
    // simple regex-based highlighting
    let html = text;
    // highlight strings (double quotes and backticks)
    html = html.replace(/("[^"]*")/g, '<span class="s">$1</span>');
    html = html.replace(/(`[^`]*`)/g, '<span class="s">$1</span>');
    // highlight keywords (let, console)
    html = html.replace(/\b(let|console|log)\b/g, '<span class="k">$1</span>');
    // highlight numbers
    html = html.replace(/\b(\d+)\b/g, '<span class="v">$1</span>');
    // highlight function calls (after console.log -> log is already highlighted)
    // we keep it simple
    return html;
  }
</script>
</body>
</html>
